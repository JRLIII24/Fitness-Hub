<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FitHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #09090b; color: #fafafa;
      display: flex; align-items: center; justify-content: center;
      min-height: 100svh;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px)
               env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }
    .container { text-align: center; padding: 2rem; max-width: 360px; }
    .icon { font-size: 3rem; margin-bottom: 1.25rem; opacity: 0.9; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #a1a1aa; line-height: 1.6; margin-bottom: 1.5rem; }
    .status { font-size: 0.75rem; color: #52525b; margin-bottom: 1.5rem; min-height: 1.2em; }
    .actions { display: flex; flex-direction: column; gap: 0.75rem; }
    .btn-primary {
      background: #c6ff00; color: #09090b; border: none;
      padding: 0.875rem 2rem; border-radius: 9999px;
      font-weight: 700; font-size: 0.875rem; cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary {
      background: transparent; color: #71717a; border: 1px solid #27272a;
      padding: 0.75rem 1.5rem; border-radius: 9999px;
      font-weight: 600; font-size: 0.8rem; cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-secondary:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Can't reach FitHub</h1>
    <p>Check your internet connection and try again. Your workout data is saved locally and will sync when you're back online.</p>
    <div class="status" id="status"></div>
    <div class="actions">
      <button class="btn-primary" onclick="location.reload()">Try Again</button>
      <button class="btn-secondary" onclick="clearData()">Clear App Data</button>
    </div>
  </div>
  <script>
    var attempt = 0;
    var maxAttempts = 3;
    var statusEl = document.getElementById('status');

    function autoRetry() {
      if (attempt >= maxAttempts) {
        statusEl.textContent = 'Auto-retry stopped. Tap "Try Again" when ready.';
        return;
      }
      attempt++;
      var delay = Math.pow(2, attempt) * 1000;
      statusEl.textContent = 'Retrying in ' + (delay / 1000) + 's... (attempt ' + attempt + '/' + maxAttempts + ')';
      setTimeout(function() {
        statusEl.textContent = 'Retrying...';
        location.reload();
      }, delay);
    }

    function clearData() {
      try { localStorage.clear(); } catch(e) {}
      try { sessionStorage.clear(); } catch(e) {}
      statusEl.textContent = 'Data cleared. Reloading...';
      setTimeout(function() { location.reload(); }, 500);
    }

    autoRetry();
  </script>
</body>
</html>
